<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>B-POS Agent</title>
    <style>
      body {
        margin: 0;
        background: #050505;
        color: white;
        font-family: Arial, sans-serif;
        padding: 32px;
      }

      .card {
        border: 1px solid #27272a;
        background: #09090b;
        border-radius: 28px;
        padding: 28px;
      }

      .badge {
        display: inline-block;
        background: rgba(34, 197, 94, 0.12);
        color: #4ade80;
        border: 1px solid rgba(34, 197, 94, 0.35);
        padding: 8px 12px;
        border-radius: 999px;
        font-weight: 900;
        font-size: 13px;
      }

      h1 {
        color: #f97316;
        font-size: 38px;
        margin: 18px 0 8px;
      }

      p {
        color: #a1a1aa;
        line-height: 1.6;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        margin-top: 24px;
      }

      .box {
        border: 1px solid #27272a;
        background: black;
        border-radius: 20px;
        padding: 18px;
      }

      .box strong {
        color: white;
      }

      .box span {
        display: block;
        margin-top: 6px;
        color: #a1a1aa;
        font-size: 13px;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div class="badge">🟢 Servicio activo</div>

      <h1>B-POS Agent</h1>

      <p>
        Servicio local para impresión automática, periféricos y comunicación
        entre B-POS Web y los dispositivos físicos de la sucursal.
      </p>

      <div class="grid">
        <div class="box">
          <strong>Puerto local</strong>
          <span>http://localhost:4850</span>
        </div>

        <div class="box">
          <strong>Estado</strong>
          <span>Escuchando trabajos de impresión</span>
        </div>

        <div class="box">
          <strong>Impresión</strong>
          <span>Print Manager conectado</span>
        </div>

        <div class="box">
          <strong>Versión</strong>
          <span>1.0.0</span>
        </div>
      </div>
    </div>
  </body>
</html>
